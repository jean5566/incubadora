databases:
  - name: incubadora-db
    plan: free
    databaseName: incubadora
    user: incubadora

services:
  - type: web
    name: incubadora-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Incubadora
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_LOCALE
        value: es
      - key: APP_FALLBACK_LOCALE
        value: es
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://incubadora-backend-5plq.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: incubadora-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: CORS_ALLOWED_ORIGINS
        value: https://incubadora-frontend.onrender.com

  - type: web
    name: incubadora-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://incubadora-backend-5plq.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
